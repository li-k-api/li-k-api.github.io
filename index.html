<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fit-n-Meal by li-k-api</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
            --accent-hover: #059669;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background Gradients */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            top: -200px;
            left: -200px;
            border-radius: 50%;
            z-index: 0;
            animation: pulse 8s infinite alternate;
        }

        .bg-glow-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
            bottom: -150px;
            right: -150px;
            border-radius: 50%;
            z-index: 0;
            animation: pulse 10s infinite alternate-reverse;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.6;
            }

            100% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            width: 100%;
            max-width: 600px;
        }

        .header {
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 300;
        }

        .app-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 3.5rem 2rem;
            text-align: center;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
        }

        .app-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .app-logo {
            width: 130px;
            height: 130px;
            border-radius: 30px;
            margin: 0 auto 1.75rem auto;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background-color: #fff;
        }

        .app-card:hover .app-logo {
            transform: scale(1.08) rotate(-4deg);
        }

        .app-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .app-desc {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            padding: 0 1rem;
            word-break: keep-all;
        }

        .play-store-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
            color: white;
            text-decoration: none;
            padding: 16px 36px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 1.15rem;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.35);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .play-store-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(16, 185, 129, 0.45);
        }

        .play-store-btn:active {
            transform: translateY(1px);
        }

        .play-store-btn svg {
            width: 26px;
            height: 26px;
            fill: currentColor;
        }

        .footer {
            margin-top: 3.5rem;
            text-align: center;
        }

        .policy-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
            position: relative;
            padding-bottom: 4px;
        }

        .policy-link::after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 1px;
            bottom: 0;
            left: 0;
            background-color: currentColor;
            transform-origin: bottom right;
            transition: transform 0.3s ease-out;
        }

        .policy-link:hover {
            color: #ffffff;
        }

        .policy-link:hover::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }

        @media (max-width: 480px) {
            .app-card {
                padding: 2.5rem 1.5rem;
            }

            .header h1 {
                font-size: 2rem;
            }

            .app-title {
                font-size: 1.8rem;
            }

            .play-store-btn {
                width: 100%;
                padding: 14px 20px;
                font-size: 1.05rem;
            }

            .app-logo {
                width: 110px;
                height: 110px;
            }
        }
    </style>
</head>

<body>
    <!-- Background Glow Effects -->
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>li-k-api App Studio</h1>
            <p>Creating experiences that move you</p>
        </header>

        <!-- Main App Card -->
        <main class="app-card">
            <img src="images/Fit-n-Meal.png" alt="Fit-n-Meal Logo" class="app-logo">

            <h2 class="app-title">Fit-n-Meal</h2>
            <p class="app-desc">귀찮은 기록은 Gemini가<br>건강한 변화는 나에게<br>앱 하나로 끝내는 식단·운동 관리</p>

            <a href="https://play.google.com/store/apps/details?id=com.kapi.fitnmeal" target="_blank"
                rel="noopener noreferrer" class="play-store-btn">
                <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                    <!-- Google Play Icon Path -->
                    <path
                        d="M325.3 234.3L104.6 13.5c-9.5-9.5-23.7-11.8-35.6-5.8C57.2 13.8 50 25.4 50 38.6v434.8c0 13.2 7.2 24.8 19 30.9 11.9 6 26.1 3.7 35.6-5.8l220.7-220.7c11.5-11.5 11.5-32 .1-43.5zM464 227.1l-113.8-65.7-90.1 90.1 90.1 90.1 113.8-65.7c16.1-9.3 26-26.4 26-44.4s-9.9-35.1-26-44.4z" />
                </svg>
                Google Play에서 다운로드
            </a>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <a href="https://li-k-api.github.io/fit-n-meal-policy/" class="policy-link">개인정보처리방침 (Privacy Policy)</a>
        </footer>
    </div>
</body>

</html>
